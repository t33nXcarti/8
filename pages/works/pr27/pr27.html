<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инфографика компании</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="infographic-section">
        <h2>Наши достижения в цифрах</h2>
        <div class="infographic-container">
            
            <!-- Блок 1 -->
            <div class="info-block block-1">
                <div class="block-number">1</div>
                <div class="block-content">
                    <div class="icon">📅</div>
                    <div class="number">10+</div>
                    <div class="label">Лет на рынке</div>
                    <p class="description">Успешно работаем и развиваемся с 2014 года</p>
                </div>
                <div class="arrow-down"></div>
            </div>

            <!-- Блок 2 -->
            <div class="info-block block-2">
                <div class="block-number">2</div>
                <div class="block-content">
                    <div class="icon">🚀</div>
                    <div class="number">540</div>
                    <div class="label">Проектов</div>
                    <p class="description">Реализованных задач для клиентов по всему миру</p>
                </div>
                <div class="arrow-down"></div>
            </div>

            <!-- Блок 3 -->
            <div class="info-block block-3">
                <div class="block-number">3</div>
                <div class="block-content">
                    <div class="icon">⭐</div>
                    <div class="number">98%</div>
                    <div class="label">Довольных клиентов</div>
                    <p class="description">Высокий рейтинг доверия и повторных обращений</p>
                </div>
                <div class="arrow-down"></div>
            </div>

            <!-- Блок 4 -->
            <div class="info-block block-4">
                <div class="block-number">4</div>
                <div class="block-content">
                    <div class="icon">🏆</div>
                    <div class="number">24/7</div>
                    <div class="label">Поддержка</div>
                    <p class="description">Круглосуточная помощь и консультации</p>
                </div>
                <div class="arrow-down"></div>
            </div>

        </div>
    </section>
</body>
</html>
